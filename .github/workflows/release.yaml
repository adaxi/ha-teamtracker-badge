name: Attach Badge to Release

on:
  release:
    types: [published]
  workflow_dispatch:  # Allows manual testing

jobs:
  attach-badge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify dist file exists
        run: |
          ls -lh dist/
          echo "Checking for ha-teamtracker-badge.js..."
          if [ ! -f "dist/ha-teamtracker-badge.js" ]; then
            echo "Error: ha-teamtracker-badge.js not found in dist/"
            exit 1
          fi

      - name: Upload release asset
        if: github.event_name == 'release'
        run: gh release upload ${{ github.event.release.tag_name }} ./dist/ha-teamtracker-badge.js --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact for testing
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: badge-build
          path: dist/ha-teamtracker-badge.js
